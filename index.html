<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>BB Graphic System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#14141d;--surface-2:#1d1d2a;--surface-3:#262635;
  --border:rgba(255,255,255,0.06);--border-strong:rgba(255,255,255,0.12);
  --accent:#FF1F8E;--accent-2:#d4006e;--accent-glow:rgba(255,31,142,0.15);--accent-soft:rgba(255,31,142,0.08);
  --text:#f1f5f9;--text-2:#94a3b8;--text-3:#64748b;
  --green:#22c55e;--green-soft:rgba(34,197,94,0.12);
  --red:#ef4444;--red-soft:rgba(239,68,68,0.12);
  --amber:#f59e0b;--amber-soft:rgba(245,158,11,0.12);
  --blue:#3b82f6;--blue-soft:rgba(59,130,246,0.12);
  --purple:#a855f7;--teal:#14b8a6;--indigo:#6366f1;
  --shadow-modal:rgba(0,0,0,0.5);--shadow-soft:rgba(0,0,0,0.25);
  --r:8px;--r-sm:6px;
  /* legacy aliases */
  --bb:var(--accent);--bb2:var(--accent-2);
  --bg2:var(--surface);--bg3:var(--surface-2);--bg4:var(--surface-3);
  --muted:var(--text-3);
  --sidebar-w:232px;--topbar-h:60px;
}
[data-theme="light"]{
  --bg:#f7f7fa;--surface:#ffffff;--surface-2:#f1f1f6;--surface-3:#e5e5ed;
  --border:rgba(15,15,30,0.08);--border-strong:rgba(15,15,30,0.18);
  --accent:#d4006e;--accent-2:#b8005e;--accent-glow:rgba(212,0,110,0.18);--accent-soft:rgba(212,0,110,0.10);
  --text:#0f1117;--text-2:#475569;--text-3:#94a3b8;
  --green:#16a34a;--green-soft:rgba(22,163,74,0.12);
  --red:#dc2626;--red-soft:rgba(220,38,38,0.10);
  --amber:#d97706;--amber-soft:rgba(217,119,6,0.12);
  --blue:#2563eb;--blue-soft:rgba(37,99,235,0.10);
  --shadow-modal:rgba(15,15,30,0.18);--shadow-soft:rgba(15,15,30,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;transition:background-color .25s ease,color .25s ease}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}

/* ─── LOGIN ────────────────────────────────── */
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:56px 48px 40px;width:100%;max-width:440px;box-shadow:0 24px 80px var(--shadow-modal)}
.login-logo-wrap{text-align:center;margin-bottom:20px}
.login-logo-img{width:120px;height:auto;display:inline-block}
.login-subtitle{font-family:'Poppins',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);text-align:center;margin-bottom:24px}
.login-input-big{width:100%;background:var(--surface-2);border:1px solid transparent;border-radius:10px;padding:18px 20px;color:var(--text);font-size:13px;font-weight:600;text-align:center;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:12px;transition:all 0.15s;display:block;outline:none}
.login-input-big::placeholder{color:var(--text-3);letter-spacing:0.24em;font-weight:500}
.login-input-big:focus{border-color:var(--accent);background:var(--surface-3)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);color:white;font-weight:800;padding:18px 20px;border-radius:10px;margin-top:4px;font-size:14px;letter-spacing:0.24em;text-transform:uppercase;transition:all 0.15s;box-shadow:0 8px 24px rgba(255,31,142,0.3);cursor:pointer;border:none;font-family:inherit}
.login-btn:hover{transform:translateY(-1px)}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:14px;min-height:16px;display:none}

/* ─── APP LAYOUT ──────────────────────────────────── */
:root{--sidebar-w:232px;--topbar-h:60px;}
#app-screen{display:flex;height:100vh;overflow:hidden;}

/* ─── SIDEBAR ─────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  position:fixed;top:0;bottom:0;left:0;z-index:200;
}
.sidebar-head{padding:16px 16px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo-img{width:120px;height:auto;display:block}
.sidebar-sub{font-size:8.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.14em;margin-top:6px}
.sidebar-clock{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px 12px;text-align:center;margin-top:10px}
.sidebar-clock-time{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.02em}
.sidebar-clock-date{font-size:10px;color:var(--text-3);margin-top:2px}

.sidebar-nav{
  flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:1px;
  overflow-y:auto;
}
.nav-section{
  font-size:8.5px;font-weight:700;letter-spacing:0.2em;color:var(--text-3);
  text-transform:uppercase;padding:12px 10px 5px;user-select:none;
}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9.5px 10px;border-radius:var(--r-sm);
  cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text-2);
  transition:all .12s;margin-bottom:1px;user-select:none;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;
}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.nav-icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.nav-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;flex-shrink:0;
}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:var(--text)}
.user-role-lbl{font-size:10px;color:var(--text-3);margin-top:1px}
.signout-btn{
  font-size:9px;font-weight:600;color:var(--text-3);cursor:pointer;
  letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:4px;
  border:1px solid var(--border);background:transparent;font-family:inherit;
  transition:all .15s;white-space:nowrap;
}
.signout-btn:hover{color:var(--red);border-color:rgba(239,68,68,0.3);background:var(--red-soft)}

/* ─── TOPBAR ──────────────────────────────── */
.app-main{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  margin-left:var(--sidebar-w);min-width:0;
}
.topbar{
  height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 24px;flex-shrink:0;
}
.topbar-title{
  font-family:'Poppins',sans-serif;font-size:17px;font-weight:700;
  color:var(--text);letter-spacing:-0.3px;
}
.topbar-badge{
  background:var(--accent);color:#fff;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:20px;
}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.topbar-btn{
  background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:inherit;
}
.topbar-btn:hover{background:var(--accent-2)}
.topbar-btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.topbar-btn.ghost:hover{background:var(--surface-3)}
.m-menu-btn{
  display:none;background:none;border:none;color:var(--text);font-size:22px;
  cursor:pointer;padding:4px;
}

/* ─── MAIN CONTENT ─────────────────────────── */
.main{flex:1;overflow-y:auto;padding:24px 28px 40px;}
.section{display:none;}
.section.active{display:block;}

/* ─── MOBILE NAV ──────────────────────────── */
.nav-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;
}

/* ─── STATS ROW ────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;
}
.stat-card .val{font-size:28px;font-weight:700;margin-bottom:4px;}
.stat-card .lbl{font-size:12px;color:var(--muted);font-weight:500;}
.stat-card.orange .val{color:var(--bb);}
.stat-card.green .val{color:var(--green);}
.stat-card.red .val{color:var(--red);}
.stat-card.amber .val{color:var(--amber);}
.stat-card.blue .val{color:var(--blue);}

/* ─── PIPELINE / KANBAN ────────────────────── */
.pipeline-wrap{
  display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;
  align-items:flex-start;
}
.pipeline-wrap::-webkit-scrollbar{height:6px;}
.pipeline-wrap::-webkit-scrollbar-track{background:var(--bg);}
.pipeline-wrap::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}

.stage-col{
  min-width:210px;max-width:210px;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  display:flex;flex-direction:column;
}
.stage-col-header{
  padding:10px 12px;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  border-radius:12px 12px 0 0;
}
.stage-count{
  background:var(--bg4);border-radius:20px;
  padding:1px 7px;font-size:11px;color:var(--muted);
}
.stage-cards{padding:8px;display:flex;flex-direction:column;gap:8px;min-height:60px;}

.project-card{
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;cursor:pointer;transition:all .15s;
}
.project-card:hover{border-color:var(--bb);background:var(--bg4);}
.project-card .pc-type{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:6px;
}
.project-card .pc-title{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3;}
.project-card .pc-client{font-size:11px;color:var(--muted);margin-bottom:6px;}
.project-card .pc-footer{display:flex;align-items:center;justify-content:space-between;}
.project-card .pc-designer{
  font-size:10px;background:var(--bg4);border-radius:4px;
  padding:2px 6px;color:var(--muted);
}
.project-card .pc-deadline{font-size:10px;color:var(--muted);}
.project-card .pc-deadline.overdue{color:var(--red);}
.project-card .pc-deadline.soon{color:var(--amber);}
.project-card .pc-priority{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
}
.project-card .pc-drive{
  font-size:10px;color:var(--green);margin-top:4px;
}
.priority-urgent{background:var(--red)!important;}
.priority-high{background:var(--amber)!important;}
.priority-normal{background:var(--bg4)!important;border:1px solid var(--border);}

/* ─── MY WORK (Designer view) ──────────────── */
.my-work-list{display:flex;flex-direction:column;gap:12px;}
.my-project-row{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer;
  transition:all .15s;
}
.my-project-row:hover{border-color:var(--bb);background:var(--bg3);}
.my-project-thumb{
  width:56px;height:56px;background:var(--bg4);border-radius:8px;
  flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:20px;
}
.my-project-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.my-project-info{flex:1;}
.my-project-info .mpi-type{font-size:11px;color:var(--muted);margin-bottom:3px;}
.my-project-info .mpi-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.my-project-info .mpi-client{font-size:12px;color:var(--muted);}
.my-project-stage{text-align:right;}
.stage-badge{
  display:inline-block;padding:4px 10px;border-radius:6px;
  font-size:11px;font-weight:700;
}
.my-project-deadline{font-size:11px;color:var(--muted);margin-top:4px;}

/* ─── PILLARS ──────────────────────────────── */
.pillars-wrap{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:20px;margin-bottom:20px;
}
.pillars-wrap h3{font-size:14px;font-weight:700;margin-bottom:16px;}
.pillar-list{display:flex;flex-direction:column;gap:8px;}
.pillar-item{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  cursor:pointer;transition:all .15s;
}
.pillar-item:hover{border-color:var(--bb);}
.pillar-item.done{background:#22c55e15;border-color:#22c55e40;}
.pillar-check{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:all .15s;
}
.pillar-item.done .pillar-check{
  background:var(--green);border-color:var(--green);color:#fff;
}
.pillar-label{font-size:13px;font-weight:500;}
.pillar-score{
  font-size:22px;font-weight:700;color:var(--bb);margin-left:auto;
}

/* ─── MODAL ────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
}
.modal-header{
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--bg2);z-index:1;
}
.modal-header h3{font-size:18px;font-weight:700;}
.modal-close{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--muted);
}
.modal-close:hover{background:var(--bg4);color:var(--text);}
.modal-body{padding:20px 24px;}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  display:flex;gap:10px;justify-content:flex-end;
}

/* ─── FORM ─────────────────────────────────── */
.form-row{margin-bottom:16px;}
.form-row label{
  display:block;font-size:12px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;
}
.form-row input,.form-row select,.form-row textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);
  outline:none;transition:border-color .15s;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{
  border-color:var(--bb);
}
.form-row textarea{resize:vertical;min-height:80px;}
.form-row select option{background:var(--bg3);}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.btn{
  padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;
}
.btn-primary{background:var(--bb);color:#fff;}
.btn-primary:hover{background:var(--bb2);}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--bg4);}
.btn-danger{background:#ef444420;color:var(--red);border:1px solid #ef444440;}
.btn-danger:hover{background:#ef444430;}
.btn-green{background:#22c55e20;color:var(--green);border:1px solid #22c55e40;}
.btn-green:hover{background:#22c55e30;}

/* ─── PROJECT DETAIL ───────────────────────── */
.detail-type-badge{
  display:inline-block;padding:4px 12px;border-radius:6px;
  font-size:12px;font-weight:700;margin-bottom:16px;
}
.detail-section{margin-bottom:20px;}
.detail-section h4{
  font-size:12px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;
}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.detail-meta-item{background:var(--bg3);border-radius:8px;padding:10px 12px;}
.detail-meta-item .dm-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;}
.detail-meta-item .dm-val{font-size:14px;font-weight:600;}

.stage-mover{display:flex;flex-direction:column;gap:8px;}
.stage-option{
  padding:10px 14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;
  transition:all .15s;display:flex;align-items:center;gap:8px;
}
.stage-option:hover{border-color:var(--bb);background:var(--bg4);}
.stage-option.current-stage{border-color:var(--bb);background:#FF6B0015;cursor:default;}
.stage-option .so-dot{
  width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--border);
  flex-shrink:0;
}
.stage-option.current-stage .so-dot{background:var(--bb);border-color:var(--bb);}

.drive-thumb{
  width:100%;max-height:300px;border-radius:10px;object-fit:contain;
  background:var(--bg3);border:1px solid var(--border);
}
.drive-link-box{
  display:flex;gap:8px;margin-top:8px;
}
.drive-link-box input{flex:1;}

/* ─── HISTORY ──────────────────────────────── */
.history-list{display:flex;flex-direction:column;gap:6px;}
.history-item{
  display:flex;align-items:center;gap:10px;
  font-size:12px;color:var(--muted);padding:6px 0;
  border-bottom:1px solid var(--border);
}
.history-item:last-child{border-bottom:none;}
.history-item .hi-stage{color:var(--text);font-weight:600;}

/* ─── ARCHIVED TABLE ───────────────────────── */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;
  text-align:left;border-bottom:1px solid var(--border);
}
.data-table td{
  padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);
  vertical-align:middle;
}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--bg3);}

/* ─── TOAST ────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:12px 18px;font-size:13px;font-weight:500;
  transform:translateY(80px);opacity:0;transition:all .3s;
  max-width:320px;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:#22c55e;color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}

/* ─── EMPTY STATE ──────────────────────────── */
.empty-state{
  text-align:center;padding:40px 20px;color:var(--muted);
}
.empty-state .es-icon{font-size:32px;margin-bottom:12px;}
.empty-state .es-text{font-size:14px;}

/* ─── RESPONSIVE ───────────────────────────── */
@media(max-width:900px){
  :root{--sidebar-w:0px;}
  .sidebar{transform:translateX(-100%);width:84vw;max-width:300px;transition:transform .28s ease;}
  .sidebar.open{transform:translateX(0);}
  .nav-overlay.open{display:block;}
  .m-menu-btn{display:block;}
  .app-main{margin-left:0;}
  .topbar{padding:0 14px;}
  .main{padding:16px 14px 34px;}
}
@media(max-width:640px){
  .stats-row{grid-template-columns:repeat(3,1fr);}

// ──────────────────────────────────────── NOISE FILTER ──
const _NOISE = /failed to fetch|networkerror|network request failed|load failed|net::|the internet connection/i;
function _isNoise(m){ return _NOISE.test(String(m)); }

window.onerror = function(msg,src,l,c,err){
  if(_isNoise(msg)) return true;
  sendAlert('JS Error: '+msg+' ('+src+':'+l+')', 'Graphic System');
  return false;
};
window.addEventListener('unhandledrejection', e=>{
  const m = e.reason ? (e.reason.message||String(e.reason)) : 'Unknown rejection';
  if(_isNoise(m)) return;
  sendAlert('Unhandled Promise: '+m, 'Graphic System');
});

function sendAlert(message, page){
  if(_isNoise(message)) return;
  fetch(ALERT_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message, page, role:'ceo'})
  }).catch(()=>{});
}

// ──────────────────────────────────────── SUPABASE HELPERS ──
async function sbGet(path){
  const r = await fetch(SB_URL+'/rest/v1/'+path, {headers:SB_HDR});
  if(!r.ok) throw new Error('GET '+path+' → '+r.status);
  return r.json();
}
async function sbPost(table, body){
  const r = await fetch(SB_URL+'/rest/v1/'+table, {
    method:'POST', headers:SB_HDR, body:JSON.stringify(body)
  });
  if(!r.ok){
    const t = await r.text();
    throw new Error('POST '+table+' → '+r.status+' '+t);
  }
  return r.json();
}
async function sbPatch(table, id, body){
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id, {
    method:'PATCH', headers:{...SB_HDR,'Prefer':'return=minimal'}, body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error('PATCH '+table+' → '+r.status);
}
async function sbUpsert(table, body, onConflict){
  const url = SB_URL+'/rest/v1/'+table+(onConflict?'?on_conflict='+onConflict:'');
  const r = await fetch(url, {
    method:'POST',
    headers:{...SB_HDR,'Prefer':'return=minimal,resolution=merge-duplicates'},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error('UPSERT '+table+' → '+r.status);
}

function renderPipeline(){
  renderStats();

  const filterType = document.getElementById('filter-type').value;

  let projects = allProjects.filter(p=>!DONE_STAGES.includes(p.current_stage));

  if(filterType) projects = projects.filter(p=>p.type===filterType);

  const wrap = document.getElementById('pipeline-wrap');
  wrap.innerHTML='';

  const activeStages = STAGES.filter(s=>!DONE_STAGES.includes(s.key));

  activeStages.forEach(stage=>{
    const stageProjs = projects.filter(p=>p.current_stage===stage.key);
    const col = document.createElement('div');
    col.className='stage-col';
    col.innerHTML=`
      <div class="stage-col-header" style="border-top:3px solid ${stage.color};border-radius:9px 9px 0 0;">
        <span style="color:${stage.color}">${stage.label}</span>
        <span class="stage-count">${stageProjs.length}</span>
      </div>
      <div class="stage-cards" id="cards-${stage.key}"></div>
    `;
    wrap.appendChild(col);

    const cardsEl = col.querySelector('.stage-cards');
    if(stageProjs.length===0){
      cardsEl.innerHTML='<div style="text-align:center;padding:12px;font-size:12px;color:var(--muted);">Empty</div>';
    } else {
      stageProjs.forEach(p=>cardsEl.appendChild(buildCard(p)));
    }
  });

  // filter change listeners
  document.getElementById('filter-designer').onchange = renderPipeline;
  document.getElementById('filter-type').onchange = renderPipeline;
}

function renderStats(){
  const active  = allProjects.filter(p=>!DONE_STAGES.includes(p.current_stage));
  const today   = new Date().toISOString().slice(0,10);
  const overdue = active.filter(p=>p.deadline&&p.deadline<today);
  const urgent  = active.filter(p=>p.priority==='urgent');
  const headRev = active.filter(p=>p.current_stage==='head_review');
  const clientAp= active.filter(p=>p.current_stage==='client_approval'||p.current_stage==='client_changes');

  const statsEl = document.getElementById('stats-row');
  statsEl.innerHTML=`
    <div class="stat-card orange"><div class="val">${active.length}</div><div class="lbl">Active Projects</div></div>
    <div class="stat-card red"><div class="val">${overdue.length}</div><div class="lbl">Overdue</div></div>
    <div class="stat-card amber"><div class="val">${urgent.length}</div><div class="lbl">Urgent</div></div>
    <div class="stat-card blue"><div class="val">${headRev.length}</div><div class="lbl">Head Review</div></div>
    <div class="stat-card green"><div class="val">${clientAp.length}</div><div class="lbl">With Client</div></div>
  `;
}

function buildCard(p){
  const card = document.createElement('div');
  card.className='project-card';
  card.onclick=()=>openDetail(p.id);

  const today=new Date().toISOString().slice(0,10);
  let deadlineHtml='';
  if(p.deadline){
    const diff=Math.ceil((new Date(p.deadline)-new Date(today))/(86400000));
    const cls=diff<0?'overdue':diff<=2?'soon':'';
    const label=diff<0?Math.abs(diff)+'d overdue':diff===0?'Today':diff+'d left';
    deadlineHtml=`<span class="pc-deadline ${cls}">${label}</span>`;
  }

  const typeColors={post:'#3b82f6',story:'#a855f7',poster:'#f59e0b',side_job:'#14b8a6',other:'#94a3b8'};
  const tc=typeColors[p.type]||'#94a3b8';
  const driveIcon=p.drive_link?'<div class="pc-drive">📎 Drive linked</div>':'';

  card.innerHTML=`
    <div class="pc-type" style="color:${tc}">${p.type.replace('_',' ')}</div>
    <div class="pc-title">${esc(p.title)}</div>
    <div class="pc-client">${esc(p.client_name||'—')}</div>
    <div class="pc-footer">
      <span class="pc-designer">${p.assigned_designer||'Unassigned'}</span>
      <div style="display:flex;align-items:center;gap:6px;">
        ${deadlineHtml}
        <div class="pc-priority priority-${p.priority}"></div>
      </div>
    </div>
    ${driveIcon}
  `;
  return card;
}

async function loadMyPillars(){
  const name=currentUser.name;
  const today=new Date().toISOString().slice(0,10);
  try {
    const rows=await sbGet(`pillars?who=eq.${name}&select=done_ids&order=updated_at.desc&limit=1`);
    const doneIds=JSON.parse(rows[0]?.done_ids||'[]');
    updatePillarUI(name, doneIds);
  } catch(e){ console.error(e); }
}

async function loadHeadPillars(){
  const today=new Date().toISOString().slice(0,10);
  for(const name of ['RUKSHAN','SUHANA']){
    try {
      const rows=await sbGet(`pillars?who=eq.${name}&select=done_ids&order=updated_at.desc&limit=1`);
      const doneIds=JSON.parse(rows[0]?.done_ids||'[]');
      updatePillarUI(name, doneIds);
    } catch(e){ console.error(e); }
  }
}

function updatePillarUI(name, doneIds){
  DESIGNER_PILLARS.forEach((p,i)=>{
    const item=document.getElementById('pitem-'+name+'-'+i);
    const check=document.getElementById('pcheck-'+name+'-'+i);
    if(!item) return;
    const done=doneIds.includes(i+1);
    item.classList.toggle('done',done);
    check.textContent=done?'✓':'';
  });
  const done=doneIds.filter(id=>id>=1&&id<=5).length;
  const scoreEl=document.getElementById('pscore-'+name);
  if(scoreEl) scoreEl.textContent=done+'/5';
}

async function togglePillar(name, idx){
  const item=document.getElementById('pitem-'+name+'-'+idx);
  const wasDone=item.classList.contains('done');
  // optimistic toggle
  item.classList.toggle('done',!wasDone);
  const check=document.getElementById('pcheck-'+name+'-'+idx);
  check.textContent=!wasDone?'✓':'';

  try {
    const rows=await sbGet(`pillars?who=eq.${name}&select=done_ids&order=updated_at.desc&limit=1`);
    let doneIds=JSON.parse(rows[0]?.done_ids||'[]');
    const id=idx+1;
    if(!wasDone){ if(!doneIds.includes(id)) doneIds.push(id); }
    else         { doneIds=doneIds.filter(d=>d!==id); }

    await sbUpsert('pillars',{who:name,done_ids:JSON.stringify(doneIds),updated_at:new Date().toISOString()},'who');
    const done=doneIds.filter(d=>d>=1&&d<=5).length;
    const scoreEl=document.getElementById('pscore-'+name);
    if(scoreEl) scoreEl.textContent=done+'/5';
    toast('Saved ✓','success');
  } catch(e){
    // revert
    item.classList.toggle('done',wasDone);
    check.textContent=wasDone?'✓':'';
    toast('Error saving','error');
  }
}

// ──────────────────────────────────────── DRIVE THUMB ──
function getDriveThumb(link){
  if(!link) return null;
  // formats:
  // https://drive.google.com/file/d/FILE_ID/view?...
  // https://drive.google.com/open?id=FILE_ID
  // https://drive.google.com/uc?id=FILE_ID
  let id=null;
  const m1=link.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  const m2=link.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m1) id=m1[1];
  else if(m2) id=m2[1];
  if(!id) return null;
  return 'https://drive.google.com/thumbnail?id='+id+'&sz=w400';
}

// ──────────────────────────────────────── UTILS ──
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

let _toastTimer=null;
function toast(msg, type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(type?' '+type:'');
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{ el.classList.remove('show'); },2800);
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadAgentAlerts(system, containerId){

      `agent_alerts?or=(system.eq.${system},system.eq.all)&order=created_at.desc&limit=30&select=*`
    );
    if(!rows || rows.length===0){
      el.innerHTML='<div class="empty-state"><div class="es-icon">✅</div><div class="es-text">No alerts — everything is running smoothly.</div></div>';
      return;
    }
    const sevColor = {critical:'var(--red)', warning:'var(--amber)', info:'var(--blue)'};
    const sevLabel = {critical:'🔴 CRITICAL', warning:'🟡 WARNING', info:'🔵 INFO'};
    el.innerHTML = rows.map(a=>{
      const col   = sevColor[a.severity]||'var(--muted)';
      const label = sevLabel[a.severity]||a.severity.toUpperCase();

          <div style="display:flex;align-items:center;gap:10px;">

            ${unread?`<button onclick="markAlertRead(${a.id})" style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted);cursor:pointer;">Mark read</button>`:''}

        <div style="font-size:11px;color:var(--muted);margin-top:6px;">Agent: ${a.agent}</div>

    }).join('');

    el.innerHTML='<div class="empty-state"><div class="es-icon">⚠</div><div class="es-text">Could not load alerts. Check connection.</div></div>';
  }

async function markAlertRead(id){
  try{
    await sbPatch('agent_alerts', id, {read_at: new Date().toISOString()});
    const row = document.getElementById('alert-row-'+id);
    if(row){
      row.style.opacity='0.6';
      row.style.borderColor='var(--border)';
      const btn = row.querySelector('button');
      if(btn) btn.remove();
      const label = row.querySelector('span');
      if(label) label.textContent = label.textContent.replace(' · NEW','');
    }
  } catch(e){ toast('Could not mark as read','error'); }
}

// ──────────────────────────────────────────────────────
// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});

// Init login
setupLoginListeners();

// Mobile hamburger + overlay
document.getElementById('m-menu-btn')?.addEventListener('click', openDrawer);
document.getElementById('nav-overlay')?.addEventListener('click', closeDrawer);

// Session persistence
(function(){
  const saved = sessionStorage.getItem('bb_graphic_user');
  if(saved){
    try {
      const u = JSON.parse(saved);
      const pin = Object.keys(USERS).find(k=>USERS[k].name===u.name);
      if(pin && USERS[pin]){ currentUser=USERS[pin]; bootApp(); return; }
    } catch(_){}
  }
})();

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(!currentUser) return;
  if(e.key==='Escape'){
    closeDrawer();
    document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));
  }
  if(e.key==='n'&&!e.target.matches('input,textarea,select')){ openAddBrief(); }
});
</script>
</body>
</html>
