<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BB Graphic System</title>
<style>
:root{
  --bb:#FF6B00;--bb2:#e55e00;
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --text:#f0f0f0;--muted:#888;--border:#333;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --purple:#a855f7;--teal:#14b8a6;--indigo:#6366f1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

/* ─── LOGIN ────────────────────────────────── */
#login-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.login-logo{
  width:80px;height:80px;background:var(--bb);border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:900;color:#fff;margin-bottom:24px;
  box-shadow:0 0 40px rgba(255,107,0,.4);
}
.login-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:40px;width:100%;max-width:380px;
}
.login-box h2{font-size:22px;font-weight:700;margin-bottom:6px;text-align:center;}
.login-box p{color:var(--muted);font-size:13px;text-align:center;margin-bottom:28px;}
.pin-display{
  display:flex;gap:10px;justify-content:center;margin-bottom:24px;
}
.pin-dot{
  width:14px;height:14px;border-radius:50%;
  background:var(--bg4);border:2px solid var(--border);
  transition:all .15s;
}
.pin-dot.filled{background:var(--bb);border-color:var(--bb);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-btn{
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:16px;font-size:20px;font-weight:600;color:var(--text);cursor:pointer;
  transition:all .1s;
}
.pin-btn:hover{background:var(--bg4);border-color:var(--bb);}
.pin-btn:active{transform:scale(.95);}
.login-error{
  background:#ef444420;border:1px solid var(--red);border-radius:8px;
  color:var(--red);padding:10px;text-align:center;font-size:13px;
  margin-top:16px;display:none;
}

/* ─── APP ──────────────────────────────────── */
#app-screen{display:none;}
.topbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;
  position:sticky;top:0;z-index:100;
}
.topbar-logo{
  width:32px;height:32px;background:var(--bb);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;flex-shrink:0;
}
.topbar-title{font-weight:700;font-size:16px;}
.topbar-badge{
  background:var(--bb);color:#fff;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:20px;
}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar-user{font-size:13px;color:var(--muted);}
.topbar-btn{
  background:var(--bb);color:#fff;border:none;border-radius:8px;
  padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
}
.topbar-btn:hover{background:var(--bb2);}
.topbar-btn.ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.topbar-btn.ghost:hover{background:var(--bg4);}

/* ─── NAV TABS ─────────────────────────────── */
.nav-tabs{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;padding:0 20px;gap:4px;overflow-x:auto;
}
.nav-tab{
  padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;
  border-bottom:2px solid transparent;color:var(--muted);white-space:nowrap;
  transition:all .15s;
}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--bb);border-bottom-color:var(--bb);font-weight:600;}

/* ─── MAIN CONTENT ─────────────────────────── */
.main{padding:20px;}
.section{display:none;}
.section.active{display:block;}

/* ─── STATS ROW ────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;
}
.stat-card .val{font-size:28px;font-weight:700;margin-bottom:4px;}
.stat-card .lbl{font-size:12px;color:var(--muted);font-weight:500;}
.stat-card.orange .val{color:var(--bb);}
.stat-card.green .val{color:var(--green);}
.stat-card.red .val{color:var(--red);}
.stat-card.amber .val{color:var(--amber);}
.stat-card.blue .val{color:var(--blue);}

/* ─── PIPELINE / KANBAN ────────────────────── */
.pipeline-wrap{
  display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;
  align-items:flex-start;
}
.pipeline-wrap::-webkit-scrollbar{height:6px;}
.pipeline-wrap::-webkit-scrollbar-track{background:var(--bg);}
.pipeline-wrap::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}

.stage-col{
  min-width:210px;max-width:210px;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  display:flex;flex-direction:column;
}
.stage-col-header{
  padding:10px 12px;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  border-radius:12px 12px 0 0;
}
.stage-count{
  background:var(--bg4);border-radius:20px;
  padding:1px 7px;font-size:11px;color:var(--muted);
}
.stage-cards{padding:8px;display:flex;flex-direction:column;gap:8px;min-height:60px;}

.project-card{
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;cursor:pointer;transition:all .15s;
}
.project-card:hover{border-color:var(--bb);background:var(--bg4);}
.project-card .pc-type{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:6px;
}
.project-card .pc-title{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3;}
.project-card .pc-client{font-size:11px;color:var(--muted);margin-bottom:6px;}
.project-card .pc-footer{display:flex;align-items:center;justify-content:space-between;}
.project-card .pc-designer{
  font-size:10px;background:var(--bg4);border-radius:4px;
  padding:2px 6px;color:var(--muted);
}
.project-card .pc-deadline{font-size:10px;color:var(--muted);}
.project-card .pc-deadline.overdue{color:var(--red);}
.project-card .pc-deadline.soon{color:var(--amber);}
.project-card .pc-priority{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
}
.project-card .pc-drive{
  font-size:10px;color:var(--green);margin-top:4px;
}
.priority-urgent{background:var(--red)!important;}
.priority-high{background:var(--amber)!important;}
.priority-normal{background:var(--bg4)!important;border:1px solid var(--border);}

/* ─── MY WORK (Designer view) ──────────────── */
.my-work-list{display:flex;flex-direction:column;gap:12px;}
.my-project-row{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer;
  transition:all .15s;
}
.my-project-row:hover{border-color:var(--bb);background:var(--bg3);}
.my-project-thumb{
  width:56px;height:56px;background:var(--bg4);border-radius:8px;
  flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:20px;
}
.my-project-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.my-project-info{flex:1;}
.my-project-info .mpi-type{font-size:11px;color:var(--muted);margin-bottom:3px;}
.my-project-info .mpi-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.my-project-info .mpi-client{font-size:12px;color:var(--muted);}
.my-project-stage{text-align:right;}
.stage-badge{
  display:inline-block;padding:4px 10px;border-radius:6px;
  font-size:11px;font-weight:700;
}
.my-project-deadline{font-size:11px;color:var(--muted);margin-top:4px;}

/* ─── PILLARS ──────────────────────────────── */
.pillars-wrap{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:20px;margin-bottom:20px;
}
.pillars-wrap h3{font-size:14px;font-weight:700;margin-bottom:16px;}
.pillar-list{display:flex;flex-direction:column;gap:8px;}
.pillar-item{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  cursor:pointer;transition:all .15s;
}
.pillar-item:hover{border-color:var(--bb);}
.pillar-item.done{background:#22c55e15;border-color:#22c55e40;}
.pillar-check{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:all .15s;
}
.pillar-item.done .pillar-check{
  background:var(--green);border-color:var(--green);color:#fff;
}
.pillar-label{font-size:13px;font-weight:500;}
.pillar-score{
  font-size:22px;font-weight:700;color:var(--bb);margin-left:auto;
}

/* ─── MODAL ────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
}
.modal-header{
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--bg2);z-index:1;
}
.modal-header h3{font-size:18px;font-weight:700;}
.modal-close{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--muted);
}
.modal-close:hover{background:var(--bg4);color:var(--text);}
.modal-body{padding:20px 24px;}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  display:flex;gap:10px;justify-content:flex-end;
}

/* ─── FORM ─────────────────────────────────── */
.form-row{margin-bottom:16px;}
.form-row label{
  display:block;font-size:12px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;
}
.form-row input,.form-row select,.form-row textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);
  outline:none;transition:border-color .15s;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{
  border-color:var(--bb);
}
.form-row textarea{resize:vertical;min-height:80px;}
.form-row select option{background:var(--bg3);}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.btn{
  padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;
}
.btn-primary{background:var(--bb);color:#fff;}
.btn-primary:hover{background:var(--bb2);}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--bg4);}
.btn-danger{background:#ef444420;color:var(--red);border:1px solid #ef444440;}
.btn-danger:hover{background:#ef444430;}
.btn-green{background:#22c55e20;color:var(--green);border:1px solid #22c55e40;}
.btn-green:hover{background:#22c55e30;}

/* ─── PROJECT DETAIL ───────────────────────── */
.detail-type-badge{
  display:inline-block;padding:4px 12px;border-radius:6px;
  font-size:12px;font-weight:700;margin-bottom:16px;
}
.detail-section{margin-bottom:20px;}
.detail-section h4{
  font-size:12px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;
}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.detail-meta-item{background:var(--bg3);border-radius:8px;padding:10px 12px;}
.detail-meta-item .dm-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;}
.detail-meta-item .dm-val{font-size:14px;font-weight:600;}

.stage-mover{display:flex;flex-direction:column;gap:8px;}
.stage-option{
  padding:10px 14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;
  transition:all .15s;display:flex;align-items:center;gap:8px;
}
.stage-option:hover{border-color:var(--bb);background:var(--bg4);}
.stage-option.current-stage{border-color:var(--bb);background:#FF6B0015;cursor:default;}
.stage-option .so-dot{
  width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--border);
  flex-shrink:0;
}
.stage-option.current-stage .so-dot{background:var(--bb);border-color:var(--bb);}

.drive-thumb{
  width:100%;max-height:300px;border-radius:10px;object-fit:contain;
  background:var(--bg3);border:1px solid var(--border);
}
.drive-link-box{
  display:flex;gap:8px;margin-top:8px;
}
.drive-link-box input{flex:1;}

/* ─── HISTORY ──────────────────────────────── */
.history-list{display:flex;flex-direction:column;gap:6px;}
.history-item{
  display:flex;align-items:center;gap:10px;
  font-size:12px;color:var(--muted);padding:6px 0;
  border-bottom:1px solid var(--border);
}
.history-item:last-child{border-bottom:none;}
.history-item .hi-stage{color:var(--text);font-weight:600;}

/* ─── ARCHIVED TABLE ───────────────────────── */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;
  text-align:left;border-bottom:1px solid var(--border);
}
.data-table td{
  padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);
  vertical-align:middle;
}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--bg3);}

/* ─── TOAST ────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:12px 18px;font-size:13px;font-weight:500;
  transform:translateY(80px);opacity:0;transition:all .3s;
  max-width:320px;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:#22c55e;color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}

/* ─── EMPTY STATE ──────────────────────────── */
.empty-state{
  text-align:center;padding:40px 20px;color:var(--muted);
}
.empty-state .es-icon{font-size:32px;margin-bottom:12px;}
.empty-state .es-text{font-size:14px;}

/* ─── RESPONSIVE ───────────────────────────── */
@media(max-width:640px){
  .stats-row{grid-template-columns:repeat(3,1fr);}
  .form-grid-2{grid-template-columns:1fr;}
  .detail-meta{grid-template-columns:1fr;}
  .modal{max-width:100%;margin:0;}
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal{border-radius:16px 16px 0 0;max-height:92vh;}
}

/* ─── SCROLLBAR ────────────────────────────── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════ LOGIN ══ -->
<div id="login-screen">
  <div class="login-logo">G</div>
  <div class="login-box">
    <h2>BB Graphic System</h2>
    <p>Enter your PIN to log in</p>
    <div class="pin-display" id="pin-display">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinKey('1')">1</button>
      <button class="pin-btn" onclick="pinKey('2')">2</button>
      <button class="pin-btn" onclick="pinKey('3')">3</button>
      <button class="pin-btn" onclick="pinKey('4')">4</button>
      <button class="pin-btn" onclick="pinKey('5')">5</button>
      <button class="pin-btn" onclick="pinKey('6')">6</button>
      <button class="pin-btn" onclick="pinKey('7')">7</button>
      <button class="pin-btn" onclick="pinKey('8')">8</button>
      <button class="pin-btn" onclick="pinKey('9')">9</button>
      <button class="pin-btn" onclick="pinKey('clr')" style="color:var(--muted)">CLR</button>
      <button class="pin-btn" onclick="pinKey('0')">0</button>
      <button class="pin-btn" onclick="pinKey('del')" style="font-size:16px">⌫</button>
    </div>
    <div class="login-error" id="login-error">Incorrect PIN. Try again.</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ APP ══ -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">G</div>
    <div class="topbar-title">BB Graphic System</div>
    <div class="topbar-badge" id="active-count-badge">...</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="topbar-btn ghost" onclick="openAddBrief()">+ Brief</button>
      <button class="topbar-btn ghost" onclick="doLogout()" style="font-size:12px">⏻</button>
    </div>
  </div>

  <div class="nav-tabs" id="nav-tabs">
    <!-- filled by JS based on role -->
  </div>

  <div class="main">

    <!-- ── PIPELINE (head + all) ── -->
    <div class="section" id="section-pipeline">
      <div class="stats-row" id="stats-row"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div style="font-size:15px;font-weight:700;">Active Pipeline</div>
        <div style="display:flex;gap:8px;">
          <select id="filter-designer" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;">
            <option value="">All Designers</option>
            <option value="RUKSHAN">Rukshan</option>
            <option value="SUHANA">Suhana</option>
          </select>
          <select id="filter-type" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;">
            <option value="">All Types</option>
            <option value="post">Post</option>
            <option value="story">Story</option>
            <option value="poster">Poster</option>
            <option value="side_job">Side Job</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="pipeline-wrap" id="pipeline-wrap"></div>
    </div>

    <!-- ── MY WORK (designer view) ── -->
    <div class="section" id="section-mywork">
      <div style="font-size:15px;font-weight:700;margin-bottom:16px;">My Active Projects</div>
      <div class="my-work-list" id="my-work-list"></div>
    </div>

    <!-- ── PILLARS ── -->
    <div class="section" id="section-pillars">
      <div class="pillars-wrap" id="pillars-wrap">
        <div class="empty-state"><div class="es-icon">⏳</div><div class="es-text">Loading pillars...</div></div>
      </div>
    </div>

    <!-- ── ARCHIVED ── -->
    <div class="section" id="section-archived">
      <div style="font-size:15px;font-weight:700;margin-bottom:16px;">Archived / Completed Projects</div>
      <div id="archived-content"></div>
    </div>

  </div><!-- /main -->
</div><!-- /app-screen -->

<!-- ═══════════════════════════════ ADD BRIEF MODAL ══ -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-header">
      <h3>Add New Brief</h3>
      <div class="modal-close" onclick="closeModal('modal-add')">✕</div>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Project Title</label>
        <input type="text" id="brief-title" placeholder="e.g. Cherry Kitchen June Post 1">
      </div>
      <div class="form-grid-2">
        <div class="form-row">
          <label>Type</label>
          <select id="brief-type">
            <option value="post">Post</option>
            <option value="story">Story</option>
            <option value="poster">Poster</option>
            <option value="side_job">Side Job</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-row">
          <label>Priority</label>
          <select id="brief-priority">
            <option value="normal">Normal</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-row">

// ──────────────────────────────────────── NOISE FILTER ──
const _NOISE = /failed to fetch|networkerror|network request failed|load failed|net::|the internet connection/i;
function _isNoise(m){ return _NOISE.test(String(m)); }

window.onerror = function(msg,src,l,c,err){
  if(_isNoise(msg)) return true;
  sendAlert('JS Error: '+msg+' ('+src+':'+l+')', 'Graphic System');
  return false;
};
window.addEventListener('unhandledrejection', e=>{
  const m = e.reason ? (e.reason.message||String(e.reason)) : 'Unknown rejection';
  if(_isNoise(m)) return;
  sendAlert('Unhandled Promise: '+m, 'Graphic System');
});

function sendAlert(message, page){
  if(_isNoise(message)) return;
  fetch(ALERT_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message, page, role:'ceo'})
  }).catch(()=>{});
}

// ──────────────────────────────────────── SUPABASE HELPERS ──
async function sbGet(path){
  const r = await fetch(SB_URL+'/rest/v1/'+path, {headers:SB_HDR});
  if(!r.ok) throw new Error('GET '+path+' → '+r.status);
  return r.json();
}
async function sbPost(table, body){
  const r = await fetch(SB_URL+'/rest/v1/'+table, {
    method:'POST', headers:SB_HDR, body:JSON.stringify(body)
  });
  if(!r.ok){
    const t = await r.text();
    throw new Error('POST '+table+' → '+r.status+' '+t);
  }
  return r.json();
}
async function sbPatch(table, id, body){
  const r = await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id, {
    method:'PATCH', headers:{...SB_HDR,'Prefer':'return=minimal'}, body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error('PATCH '+table+' → '+r.status);
}
async function sbUpsert(table, body, onConflict){
  const url = SB_URL+'/rest/v1/'+table+(onConflict?'?on_conflict='+onConflict:'');
  const r = await fetch(url, {
    method:'POST',
    headers:{...SB_HDR,'Prefer':'return=minimal,resolution=merge-duplicates'},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error('UPSERT '+table+' → '+r.status);
}

  card.onclick=()=>openDetail(p.id);

  const today=new Date().toISOString().slice(0,10);
  let deadlineHtml='';
  if(p.deadline){
    const diff=Math.ceil((new Date(p.deadline)-new Date(today))/(86400000));
    const cls=diff<0?'overdue':diff<=2?'soon':'';
    const label=diff<0?Math.abs(diff)+'d overdue':diff===0?'Today':diff+'d left';
    deadlineHtml=`<span class="pc-deadline ${cls}">${label}</span>`;
  }

  const typeColors={post:'#3b82f6',story:'#a855f7',poster:'#f59e0b',side_job:'#14b8a6',other:'#94a3b8'};
  const tc=typeColors[p.type]||'#94a3b8';
  const driveIcon=p.drive_link?'<div class="pc-drive">📎 Drive linked</div>':'';

  card.innerHTML=`
    <div class="pc-type" style="color:${tc}">${p.type.replace('_',' ')}</div>
    <div class="pc-title">${esc(p.title)}</div>
    <div class="pc-client">${esc(p.client_name||'—')}</div>
    <div class="pc-footer">
      <span class="pc-designer">${p.assigned_designer||'Unassigned'}</span>
      <div style="display:flex;align-items:center;gap:6px;">
        ${deadlineHtml}
        <div class="pc-priority priority-${p.priority}"></div>
      </div>
    </div>
    ${driveIcon}
  `;
  return card;
}

      `).join('')}

async function loadMyPillars(){
  const name=currentUser.name;
  const today=new Date().toISOString().slice(0,10);
  try {
    const rows=await sbGet(`pillars?who=eq.${name}&select=done_ids&order=updated_at.desc&limit=1`);
    const doneIds=JSON.parse(rows[0]?.done_ids||'[]');
    updatePillarUI(name, doneIds);
  } catch(e){ console.error(e); }
}

async function loadHeadPillars(){
  const today=new Date().toISOString().slice(0,10);
  for(const name of ['RUKSHAN','SUHANA']){
    try {
      const rows=await sbGet(`pillars?who=eq.${name}&select=done_ids&order=updated_at.desc&limit=1`);
      const doneIds=JSON.parse(rows[0]?.done_ids||'[]');
      updatePillarUI(name, doneIds);
    } catch(e){ console.error(e); }
  }
}

function updatePillarUI(name, doneIds){
  DESIGNER_PILLARS.forEach((p,i)=>{
    const item=document.getElementById('pitem-'+name+'-'+i);
    const check=document.getElementById('pcheck-'+name+'-'+i);
    if(!item) return;
    const done=doneIds.includes(i+1);
    item.classList.toggle('done',done);
    check.textContent=done?'✓':'';
  });
  const done=doneIds.filter(id=>id>=1&&id<=5).length;
  const scoreEl=document.getElementById('pscore-'+name);
  if(scoreEl) scoreEl.textContent=done+'/5';
}

async function togglePillar(name, idx){
  const item=document.getElementById('pitem-'+name+'-'+idx);
  const wasDone=item.classList.contains('done');
  // optimistic toggle
  item.classList.toggle('done',!wasDone);
  const check=document.getElementById('pcheck-'+name+'-'+idx);
  check.textContent=!wasDone?'✓':'';

  try {
    const rows=await sbGet(`pillars?who=eq.${name}&select=done_ids&order=updated_at.desc&limit=1`);
    let doneIds=JSON.parse(rows[0]?.done_ids||'[]');
    const id=idx+1;
    if(!wasDone){ if(!doneIds.includes(id)) doneIds.push(id); }
    else         { doneIds=doneIds.filter(d=>d!==id); }

    await sbUpsert('pillars',{who:name,done_ids:JSON.stringify(doneIds),updated_at:new Date().toISOString()},'who');
    const done=doneIds.filter(d=>d>=1&&d<=5).length;
    const scoreEl=document.getElementById('pscore-'+name);
    if(scoreEl) scoreEl.textContent=done+'/5';
    toast('Saved ✓','success');
  } catch(e){
    // revert
    item.classList.toggle('done',wasDone);
    check.textContent=wasDone?'✓':'';
    toast('Error saving','error');
  }
}

  // Pre-assign if designer is logged in
  if(currentUser.role==='designer'){
    document.getElementById('brief-designer').value=currentUser.name;
  }
  openModal('modal-add');
}

async function submitBrief(){
  const title   = document.getElementById('brief-title').value.trim();
  const type    = document.getElementById('brief-type').value;
  const priority= document.getElementById('brief-priority').value;
  const cid     = document.getElementById('brief-client').value;
  const des     = document.getElementById('brief-designer').value;
  const deadline= document.getElementById('brief-deadline').value;
  const dims    = document.getElementById('brief-dimensions').value.trim();
  const notes   = document.getElementById('brief-notes').value.trim();

  if(!title){ toast('Please enter a project title','error'); return; }

  const cName = cid ? (clients.find(c=>c.id==cid)||{name:''}).name : '';

  const body={
    title, type, priority,
    client_id: cid||null, client_name: cName||null,
    assigned_designer_id: des?({RUKSHAN:4,SUHANA:3}[des]||null):null,
    assigned_designer: des||null,
    current_stage:'brief',
    deadline: deadline||null,
    dimensions: dims||null,
    brief_notes: notes||null,
    created_by: currentUser.name,
    is_archived: false,
  };

  try {
    const result=await sbPost('graphic_projects',body);
    const newId=Array.isArray(result)?result[0]?.id:result?.id;
    if(newId){
      await sbPost('graphic_stage_history',{
        graphic_project_id:newId,
        stage:'brief',
        entered_by:currentUser.name,
        entered_at:new Date().toISOString()
      });
    }
    closeModal('modal-add');
    toast('Brief added ✓','success');
    await loadProjects();
    if(document.getElementById('section-pipeline').classList.contains('active')) renderPipeline();
    if(document.getElementById('section-mywork').classList.contains('active'))   renderMyWork();
  } catch(e){
    console.error(e);
    toast('Error adding brief: '+e.message,'error');
  }
}

// ──────────────────────────────────────── PROJECT DETAIL ──
async function openDetail(id){
  const p = allProjects.find(x=>x.id===id);
  if(!p) return;

  document.getElementById('detail-title').textContent = p.title;
  openModal('modal-detail');
  renderDetailBody(p);

  // Load history async
  try {
    const hist=await sbGet('graphic_stage_history?graphic_project_id=eq.'+id+'&order=entered_at.desc&select=*');
    renderHistory(hist);
  } catch(e){}
}

function renderDetailBody(p){
  const stage  = STAGE_MAP[p.current_stage]||{label:p.current_stage,color:'#888'};
  const today  = new Date().toISOString().slice(0,10);
  const isHead = currentUser.role==='head';
  const isOwner= currentUser.role==='designer'&&currentUser.name===p.assigned_designer;
  const canAct = isHead||isOwner;

  const typeColors={post:'#3b82f6',story:'#a855f7',poster:'#f59e0b',side_job:'#14b8a6',other:'#94a3b8'};

  const thumbHtml = p.drive_link ? (()=>{
    const t=getDriveThumb(p.drive_link);
    return t?`<img src="${t}" class="drive-thumb" onerror="this.style.display='none'">`:'';
  })() : '';

  // Stage mover — show sensible next/prev options
  const curIdx = STAGES.findIndex(s=>s.key===p.current_stage);
  let stageMoverHtml='';
  if(canAct){
    const opts = STAGES.filter((_,i)=>Math.abs(i-curIdx)<=2 || DONE_STAGES.includes(STAGES[i]?.key));
    stageMoverHtml=`
      <div class="detail-section">
        <h4>Move Stage</h4>
        <div class="stage-mover">
          ${opts.map(s=>`
            <div class="stage-option ${s.key===p.current_stage?'current-stage':''}"
              ${s.key!==p.current_stage?`onclick="moveStage(${p.id},'${s.key}')"`:''}
              style="border-color:${s.key===p.current_stage?s.color:''}">
              <div class="so-dot" style="${s.key===p.current_stage?`background:${s.color};border-color:${s.color}`:''}"></div>
              ${s.label}
              ${s.key===p.current_stage?'<span style="margin-left:auto;font-size:11px;color:var(--muted)">Current</span>':''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // Drive link section
  const driveSectionHtml = canAct ? `
    <div class="detail-section">
      <h4>Drive Link (Final File)</h4>
      ${thumbHtml}
      <div class="drive-link-box">
        <input type="text" id="drive-link-input" placeholder="Paste Google Drive share link here"
          value="${esc(p.drive_link||'')}">
        <button class="btn btn-primary" style="white-space:nowrap" onclick="saveDriveLink(${p.id})">Save</button>
      </div>
    </div>
  ` : (p.drive_link ? `
    <div class="detail-section">
      <h4>Final File</h4>
      ${thumbHtml}
      <a href="${esc(p.drive_link)}" target="_blank" style="color:var(--bb);font-size:13px;">Open in Drive ↗</a>
    </div>
  ` : '');

  const body = document.getElementById('detail-body');
  body.innerHTML=`
    <span class="detail-type-badge" style="background:${typeColors[p.type]||'#888'}20;color:${typeColors[p.type]||'#888'}">
      ${p.type.replace('_',' ').toUpperCase()}
    </span>
    <div style="margin-bottom:16px;">
      <span class="stage-badge" style="background:${stage.color}20;color:${stage.color};border:1px solid ${stage.color}40;font-size:13px;">
        ${stage.label}
      </span>
    </div>

    <div class="detail-section">
      <div class="detail-meta">
        <div class="detail-meta-item">
          <div class="dm-lbl">Client</div>
          <div class="dm-val">${esc(p.client_name||'—')}</div>
        </div>
        <div class="detail-meta-item">
          <div class="dm-lbl">Designer</div>
          <div class="dm-val">${p.assigned_designer||'Unassigned'}</div>
        </div>
        <div class="detail-meta-item">
          <div class="dm-lbl">Priority</div>
          <div class="dm-val" style="color:${p.priority==='urgent'?'var(--red)':p.priority==='high'?'var(--amber)':'var(--text)'}">
            ${p.priority.toUpperCase()}
          </div>
        </div>
        <div class="detail-meta-item">
          <div class="dm-lbl">Deadline</div>
          <div class="dm-val" style="${p.deadline&&p.deadline<today?'color:var(--red)':''}">
            ${p.deadline||'—'}
          </div>
        </div>
        ${p.dimensions?`
        <div class="detail-meta-item">
          <div class="dm-lbl">Dimensions</div>
          <div class="dm-val">${esc(p.dimensions)}</div>
        </div>`:``}
        <div class="detail-meta-item">
          <div class="dm-lbl">Added by</div>
          <div class="dm-val">${esc(p.created_by||'—')}</div>
        </div>
      </div>
    </div>

    ${p.brief_notes?`
    <div class="detail-section">
      <h4>Brief</h4>
      <div style="background:var(--bg3);border-radius:8px;padding:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;">${esc(p.brief_notes)}</div>
    </div>`:``}

    ${driveSectionHtml}
    ${stageMoverHtml}

    <div class="detail-section" id="history-section">
      <h4>Stage History</h4>
      <div class="history-list" id="history-list">
        <div style="color:var(--muted);font-size:12px;">Loading...</div>
      </div>
    </div>
  `;

  const footer = document.getElementById('detail-footer');
  footer.innerHTML='';
  if(isHead){
    const archBtn=document.createElement('button');
    archBtn.className='btn btn-danger';
    archBtn.textContent='Archive';
    archBtn.onclick=()=>archiveProject(p.id);
    footer.appendChild(archBtn);
  }
  const closeBtn=document.createElement('button');
  closeBtn.className='btn btn-secondary';
  closeBtn.textContent='Close';
  closeBtn.onclick=()=>closeModal('modal-detail');
  footer.appendChild(closeBtn);
}

function renderHistory(hist){
  const el=document.getElementById('history-list');
  if(!el) return;
  if(!hist||hist.length===0){
    el.innerHTML='<div style="color:var(--muted);font-size:12px;">No history yet</div>';
    return;
  }
  el.innerHTML=hist.map(h=>{
    const s=STAGE_MAP[h.stage]||{label:h.stage,color:'#888'};
    const d=new Date(h.entered_at);
    const fmt=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+
               d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    return `
      <div class="history-item">
        <span class="hi-stage" style="color:${s.color}">${s.label}</span>
        <span>by ${esc(h.entered_by||'?')}</span>
        <span style="margin-left:auto">${fmt}</span>
      </div>
    `;
  }).join('');
}

async function moveStage(id, newStage){
  const p=allProjects.find(x=>x.id===id);
  if(!p) return;

  try {
    await sbPatch('graphic_projects',id,{
      current_stage:newStage,
      updated_at:new Date().toISOString()
    });
    await sbPost('graphic_stage_history',{
      graphic_project_id:id,
      stage:newStage,
      entered_by:currentUser.name,
      entered_at:new Date().toISOString()
    });
    // Update local state
    p.current_stage=newStage;
    toast('Moved to '+STAGE_MAP[newStage].label,'success');
    closeModal('modal-detail');
    await loadProjects();
    if(document.getElementById('section-pipeline').classList.contains('active')) renderPipeline();
    if(document.getElementById('section-mywork').classList.contains('active'))   renderMyWork();
  } catch(e){
    console.error(e);
    toast('Error moving stage','error');
  }
}

async function saveDriveLink(id){
  const val=document.getElementById('drive-link-input').value.trim();
  try {
    await sbPatch('graphic_projects',id,{drive_link:val||null,updated_at:new Date().toISOString()});
    const p=allProjects.find(x=>x.id===id);
    if(p) p.drive_link=val||null;
    toast('Drive link saved ✓','success');
    // Refresh thumbnail
    const t=getDriveThumb(val);
    const existing=document.querySelector('.drive-thumb');
    if(existing&&t){ existing.src=t; existing.style.display=''; }
  } catch(e){ toast('Error saving link','error'); }
}

async function archiveProject(id){
  if(!confirm('Archive this project? You can restore it from the Archived tab.')) return;
  try {
    await sbPatch('graphic_projects',id,{is_archived:true,updated_at:new Date().toISOString()});
    toast('Project archived','success');
    closeModal('modal-detail');
    await loadProjects();
    if(document.getElementById('section-pipeline').classList.contains('active')) renderPipeline();
    if(document.getElementById('section-mywork').classList.contains('active'))   renderMyWork();
  } catch(e){ toast('Error archiving','error'); }
}

// ──────────────────────────────────────── DRIVE THUMB ──
function getDriveThumb(link){
  if(!link) return null;
  // formats:
  // https://drive.google.com/file/d/FILE_ID/view?...
  // https://drive.google.com/open?id=FILE_ID
  // https://drive.google.com/uc?id=FILE_ID
  let id=null;
  const m1=link.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  const m2=link.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m1) id=m1[1];
  else if(m2) id=m2[1];
  if(!id) return null;
  return 'https://drive.google.com/thumbnail?id='+id+'&sz=w400';
}

// ──────────────────────────────────────── UTILS ──
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

let _toastTimer=null;
function toast(msg, type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(type?' '+type:'');
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{ el.classList.remove('show'); },2800);
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});

// Keyboard shortcut: N = new brief (when logged in)
document.addEventListener('keydown',e=>{
  if(!currentUser) return;
  if(e.key==='Escape'){ document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open')); }
  if(e.key==='n'&&!e.target.matches('input,textarea,select')){ openAddBrief(); }
});
</script>
